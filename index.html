<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adarkenigma LLC</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #5b6770;
      --accent: #0f6e6e;
      --line: #d9e0e2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: #fbfcfc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 540px;
      text-align: center;
    }
    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(30px, 6vw, 46px);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .rule {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 18px auto;
      border: 0;
    }
    p {
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }
    footer {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Hospitality Consultancy</p>
    <h1>adarkenigma LLC</h1>
    <hr class="rule">
    <p>A human-first partner for independent hotels. Training for housekeeping, front desk, and night audit, plus back-office support that helps small properties run well and earn more.</p>
    <footer>Full site coming soon.</footer>
  </main>
</body>
</html>
